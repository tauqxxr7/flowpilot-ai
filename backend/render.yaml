services:
  - type: web
    name: flowpilot-ai-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FLOWPILOT_ALLOWED_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
