<svg width="1400" height="520" viewBox="0 0 1400 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FlowPilot AI Architecture</title>
  <desc id="desc">Operational pipeline from customer query to intent detection, retrieval, decision engine, workflow routing, ticket escalation, and dashboard analytics.</desc>
  <rect width="1400" height="520" rx="24" fill="#F6F7F9"/>
  <rect x="36" y="36" width="1328" height="448" rx="18" fill="white" stroke="#D9DEE8"/>
  <text x="76" y="92" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">FlowPilot AI Architecture</text>
  <text x="76" y="124" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="16">Business workflow orchestration pipeline for support, sales, escalation, and operations analytics</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#0F766E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#111827" flood-opacity="0.08"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="76" y="190" width="150" height="112" rx="10" fill="#111827"/>
    <text x="151" y="236" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Customer</text>
    <text x="151" y="260" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Query</text>
    <text x="151" y="282" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="12">web / email / support</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="276" y="190" width="150" height="112" rx="10" fill="#F7F8FB" stroke="#D9DEE8"/>
    <text x="351" y="238" text-anchor="middle" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Intent</text>
    <text x="351" y="262" text-anchor="middle" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Detection</text>
    <text x="351" y="284" text-anchor="middle" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="12">refund / sales / risk</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="476" y="190" width="150" height="112" rx="10" fill="#F7F8FB" stroke="#D9DEE8"/>
    <text x="551" y="238" text-anchor="middle" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Knowledge</text>
    <text x="551" y="262" text-anchor="middle" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Retrieval</text>
    <text x="551" y="284" text-anchor="middle" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="12">policy snippets</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="676" y="190" width="150" height="112" rx="10" fill="#F7F8FB" stroke="#D9DEE8"/>
    <text x="751" y="238" text-anchor="middle" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">AI Decision</text>
    <text x="751" y="262" text-anchor="middle" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Engine</text>
    <text x="751" y="284" text-anchor="middle" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="12">grounded response</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="876" y="190" width="150" height="112" rx="10" fill="#F7F8FB" stroke="#D9DEE8"/>
    <text x="951" y="238" text-anchor="middle" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Workflow</text>
    <text x="951" y="262" text-anchor="middle" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Router</text>
    <text x="951" y="284" text-anchor="middle" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="12">action + owner</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1076" y="190" width="150" height="112" rx="10" fill="#F7F8FB" stroke="#D9DEE8"/>
    <text x="1151" y="238" text-anchor="middle" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Ticket /</text>
    <text x="1151" y="262" text-anchor="middle" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Escalation</text>
    <text x="1151" y="284" text-anchor="middle" fill="#667085" font-family="Inter, Arial, sans-serif" font-size="12">auditable record</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1110" y="354" width="190" height="76" rx="10" fill="#ECFDF5" stroke="#99F6E4"/>
    <text x="1205" y="386" text-anchor="middle" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Dashboard Analytics</text>
    <text x="1205" y="410" text-anchor="middle" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="12">tickets, confidence, categories</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="454" y="354" width="194" height="76" rx="10" fill="#FFFBEB" stroke="#FDE68A"/>
    <text x="551" y="386" text-anchor="middle" fill="#92400E" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Knowledge Store</text>
    <text x="551" y="410" text-anchor="middle" fill="#92400E" font-family="Inter, Arial, sans-serif" font-size="12">SQLite documents + uploads</text>
  </g>

  <line x1="226" y1="246" x2="266" y2="246" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="426" y1="246" x2="466" y2="246" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="626" y1="246" x2="666" y2="246" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="826" y1="246" x2="866" y2="246" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1026" y1="246" x2="1066" y2="246" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1151 302V342" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M551 354V314" stroke="#B45309" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
</svg>
